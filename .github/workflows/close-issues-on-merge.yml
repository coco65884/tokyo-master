name: Close Issues on Merge

on:
  pull_request:
    types: [closed]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close related issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          BODY="${{ github.event.pull_request.body }}"

          # Extract issue numbers from "Closes #N" in PR body
          echo "$BODY" | grep -oP 'Closes #\K[0-9]+' | while read -r ISSUE_NUM; do
            gh issue close "$ISSUE_NUM" --repo "${{ github.repository }}" --comment "Closed by PR #${{ github.event.pull_request.number }}"
          done
